<!DOCTYPE html>
<html>
<head>
<title>Transaction History</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body class="transaction-bg">

<div class="container">

<h2>Transaction History</h2>

<table>

<tr>
<th>ID</th>
<th>Type</th>
<th>Amount</th>
</tr>

{% for t in data %}

<tr>

<td>{{t.id}}</td>
<td>{{t.type}}</td>
<td>{{t.amount}}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/dashboard">Back to Dashboard</a>

</div>

</body>
</html>
